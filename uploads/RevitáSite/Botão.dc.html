<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<sc-if value="{{ isLink }}" hint-placeholder-val="{{ false }}">
  <a href="{{ href }}" style="{{ rootStyle }}" style-hover="{{ hoverStyle }}">
    <span style="{{ labelStyle }}">{{ label }}</span>
    <sc-if value="{{ hasArrow }}" hint-placeholder-val="{{ false }}">
      <span style="{{ arrowStyle }}">→</span>
    </sc-if>
  </a>
</sc-if>
<sc-if value="{{ isButton }}" hint-placeholder-val="{{ true }}">
  <button type="button" style="{{ rootStyle }}" style-hover="{{ hoverStyle }}">
    <span style="{{ labelStyle }}">{{ label }}</span>
    <sc-if value="{{ hasArrow }}" hint-placeholder-val="{{ false }}">
      <span style="{{ arrowStyle }}">→</span>
    </sc-if>
  </button>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:120},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Agendar Consulta&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;primary&quot;,&quot;outlineLight&quot;,&quot;outlineDark&quot;],&quot;default&quot;:&quot;primary&quot;,&quot;tsType&quot;:&quot;\&quot;primary\&quot; | \&quot;outlineLight\&quot; | \&quot;outlineDark\&quot;&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sm&quot;,&quot;md&quot;,&quot;lg&quot;],&quot;default&quot;:&quot;md&quot;,&quot;tsType&quot;:&quot;\&quot;sm\&quot; | \&quot;md\&quot; | \&quot;lg\&quot;&quot;},&quot;arrow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;fullWidth&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;href&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const variant = this.props.variant ?? "primary"; // primary | outlineLight | outlineDark
    const size = this.props.size ?? "md";            // sm | md | lg
    const label = this.props.label ?? "Agendar Consulta";
    const hasArrow = this.props.arrow ?? false;
    const fullWidth = this.props.fullWidth ?? false;
    const href = this.props.href ?? "";
    const isLink = !!href;

    const espresso = "rgb(30,23,18)";
    const cocoa = "rgb(43,35,22)";
    const cream = "rgb(236,231,222)";
    const sand = "rgb(228,221,211)";
    const offwhite = "rgb(250,250,248)";

    const sizes = {
      sm: { padV: 10, padH: 22, fs: 16, h: 44 },
      md: { padV: 13, padH: 30, fs: 18, h: 52 },
      lg: { padV: 16, padH: 40, fs: 20, h: 58 },
    };
    const s = sizes[size] || sizes.md;

    const base = {
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      gap: "10px",
      height: s.h + "px",
      padding: `0 ${s.padH}px`,
      width: fullWidth ? "100%" : "auto",
      borderRadius: "15px",
      border: "1px solid transparent",
      cursor: "pointer",
      transition: "background-color .35s cubic-bezier(.22,.61,.36,1), color .35s ease, border-color .35s ease, transform .35s cubic-bezier(.22,.61,.36,1), box-shadow .35s ease",
      boxSizing: "border-box",
      background: "transparent",
    };

    let rootStyle, hoverStyle, color;
    base.textDecoration = "none";
    if (variant === "outlineLight") {
      rootStyle = { ...base, borderColor: "rgba(236,231,222,0.75)", color: cream };
      hoverStyle = { backgroundColor: "rgba(236,231,222,0.12)", borderColor: cream, color: cream, transform: "translateY(-1px) scale(1.02)" };
      color = cream;
    } else if (variant === "outlineDark") {
      rootStyle = { ...base, borderColor: "rgba(43,35,22,0.7)", color: cocoa };
      hoverStyle = { backgroundColor: "rgba(43,35,22,0.08)", borderColor: cocoa, color: cocoa, transform: "translateY(-1px) scale(1.02)" };
      color = cocoa;
    } else {
      rootStyle = { ...base, backgroundColor: espresso, color: offwhite };
      hoverStyle = { backgroundColor: "rgb(162,132,94)", color: offwhite, transform: "translateY(-2px) scale(1.04)", boxShadow: "0 16px 32px -14px rgba(30,23,18,0.6)" };
      color = offwhite;
    }

    const labelStyle = {
      fontFamily: '"Bodoni Moda", Georgia, serif',
      fontWeight: 500,
      fontSize: s.fs + "px",
      lineHeight: 1,
      letterSpacing: "0.01em",
      whiteSpace: "nowrap",
    };
    const arrowStyle = { fontSize: s.fs + "px", lineHeight: 1, transform: "translateY(-1px)" };

    return { rootStyle, hoverStyle, labelStyle, arrowStyle, label, hasArrow, href, isLink, isButton: !isLink };
  }
}
</script>
</body>
</html>
