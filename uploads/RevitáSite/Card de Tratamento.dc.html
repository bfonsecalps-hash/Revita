<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600&family=Noto+Sans:wght@400;500&family=EB+Garamond:wght@400&display=swap" rel="stylesheet">
  <style>
    .rev-card{ position:relative; display:flex; flex-direction:column; width:100%; height:100%; background:rgb(236,231,222); border:0.5px solid rgba(43,35,22,0.18); border-radius:6px; overflow:hidden; box-sizing:border-box; transition:transform .3s cubic-bezier(.22,.61,.36,1), box-shadow .35s ease; }
    .rev-card:hover{ box-shadow:0 26px 60px -28px rgba(30,23,18,0.55); }
    .rev-img-wrap{ position:relative; width:100%; overflow:hidden; flex-shrink:0; }
    .rev-img-zoom{ position:absolute; inset:0; background:rgb(43,35,22); transition:transform .7s cubic-bezier(.22,.61,.36,1); }
    .rev-card:hover .rev-img-zoom{ transform:scale(1.08); }
    .rev-stripes{ position:absolute; inset:0; background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 11px); }
    .rev-overlay{ position:absolute; inset:0; background:linear-gradient(to top, rgba(30,23,18,0.78), rgba(30,23,18,0.3)); opacity:0; transition:opacity .5s ease; }
    .rev-card:hover .rev-overlay{ opacity:1; }
    .rev-overtext{ position:absolute; left:24px; bottom:22px; display:flex; align-items:center; gap:9px; font-family:'EB Garamond',serif; font-size:18px; letter-spacing:0.02em; color:rgb(236,231,222); opacity:0; transform:translateY(16px); transition:opacity .45s ease .12s, transform .5s cubic-bezier(.22,.61,.36,1) .12s; }
    .rev-card:hover .rev-overtext{ opacity:1; transform:translateY(0); }
    .rev-body{ display:flex; flex-direction:column; gap:14px; padding:28px 30px 30px; background:rgb(236,231,222); transition:background-color .4s ease; }
    .rev-card:hover .rev-body{ background:rgb(30,23,18); }
    .rev-eyebrow{ font-family:'Bodoni Moda',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:rgb(122,108,94); transition:color .4s ease; }
    .rev-card:hover .rev-eyebrow{ color:rgba(236,231,222,0.7); }
    .rev-title{ margin:0; font-family:'Noto Sans',sans-serif; font-weight:400; font-size:28px; line-height:1.15; color:rgb(43,35,22); transition:color .4s ease; }
    .rev-card:hover .rev-title{ color:rgb(250,250,248); }
    .rev-desc{ margin:0; font-family:'Bodoni Moda',serif; font-size:17px; line-height:1.55; color:rgb(43,35,22); opacity:0.82; transition:color .4s ease, opacity .4s ease; }
    .rev-card:hover .rev-desc{ color:rgba(236,231,222,0.78); opacity:1; }
    .rev-link{ display:inline-flex; align-items:center; gap:8px; margin-top:6px; align-self:flex-start; font-family:'EB Garamond',serif; font-size:18px; color:rgb(30,23,18); text-decoration:none; border-bottom:1px solid rgba(30,23,18,0.4); padding-bottom:3px; transition:color .4s ease, gap .3s ease, border-color .4s ease; }
    .rev-card:hover .rev-link{ color:rgb(236,231,222); border-color:rgba(236,231,222,0.55); }
    .rev-link:hover{ gap:14px; }
    .rev-arrow{ transition:transform .3s ease; }
    .rev-link:hover .rev-arrow{ transform:translateX(5px); }
  </style>
</helmet>
<article class="rev-card" data-tilt="5" data-tilt-lift="6">
  <div class="rev-img-wrap" style="height:{{ imgHeight }};">
    <div class="rev-img-zoom"><div class="rev-stripes"></div></div>
    <span style="position:absolute; left:20px; top:18px; z-index:2; font-family:'Bodoni Moda',serif; font-size:13px; letter-spacing:0.25em; color:rgba(236,231,222,0.7);">{{ number }}</span>
    <div style="position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); z-index:1; font-family:'Noto Sans',sans-serif; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(236,231,222,0.5);">{{ imageLabel }}</div>
    <div class="rev-overlay"></div>
    <div class="rev-overtext">Ver tratamento <span class="rev-arrow">→</span></div>
  </div>
  <div class="rev-body">
    <span class="rev-eyebrow">{{ category }}</span>
    <h3 class="rev-title">{{ title }}</h3>
    <p class="rev-desc">{{ description }}</p>
    <a href="#" class="rev-link">{{ cta }} <span class="rev-arrow">→</span></a>
  </div>
</article>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:560},&quot;number&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;01&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;category&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ortodontia&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Reabilitação Oral&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;description&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Reabilitação completa com estética natural e função definitiva.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;imageLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;foto do tratamento&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cta&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Saiba mais&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tall&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      number: this.props.number ?? "01",
      category: this.props.category ?? "Ortodontia",
      title: this.props.title ?? "Reabilitação Oral",
      description: this.props.description ?? "Reabilitação completa com estética natural e função definitiva, devolvendo confiança ao sorriso.",
      imageLabel: this.props.imageLabel ?? "foto do tratamento",
      cta: this.props.cta ?? "Saiba mais",
      imgHeight: (this.props.tall ?? false) ? "440px" : "360px",
    };
  }
}
</script>
</body>
</html>
